<header class="fixed top-0 left-0 right-0 z-50 h-16 bg-[#e0e5ec] shadow-[0_4px_8px_rgba(163,177,198,0.4)] flex items-center justify-between px-4">

  <!-- MENU -->
  <button (click)="menuClick.emit()" class="rounded-full bg-[#e0e5ec] shadow-[-5px_-5px_10px_#ffffff,5px_5px_10px_#a3b1c6] p-2">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <!-- TITLE -->
  <h1 class="text-lg font-bold text-gray-800">{{ title }}</h1>

  <!-- 🔥 DARK MODE BUTTON -->
  <button
    (click)="toggleDark.emit()"
    class="rounded-full bg-[#e0e5ec] px-3 py-1 shadow-[4px_4px_8px_#a3b1c6,-4px_-4px_8px_#ffffff]"
  >
    🌙
  </button>

</header>
